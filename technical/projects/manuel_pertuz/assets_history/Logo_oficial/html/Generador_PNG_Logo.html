<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Generador Logo PNG - Manuel Pertuz</title>
    <link href="https://fonts.googleapis.com/css2?family=Allison&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 50px;
            background: #f0f0f0;
        }

        /* Fondo de cuadritos transparente para el área del canvas */
        #canvas {
            border: 1px dashed #ccc;
            background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAMUlEQVQ4T2NkYNgfQEhgIKzAwOADRzBiVMDIAA0tY/wPIjEGYP//A3XQ0DJsAKi0AABXywwE8yDBZAAAAABJRU5ErkJggg==');
            margin: 20px auto;
            display: block;
            max-width: 100%;
        }

        button {
            padding: 15px 30px;
            font-size: 16px;
            cursor: pointer;
            background: #1c1c1c;
            color: #fff;
            border: none;
            border-radius: 4px;
            transition: 0.3s;
        }

        button:hover {
            background: #333;
        }

        .instructions {
            max-width: 600px;
            margin: 0 auto 20px;
            line-height: 1.6;
            color: #444;
        }
    </style>
</head>

<body>
    <h2>Extracción de tu Firma en Alta Resolución (Transparente)</h2>
    <div class="instructions">
        <p>Al no tener instalada la fuente "Allison" en tu sistema, el archivo SVG anterior no renderizó como debía.
            Aquí puedes previsualizar y extraer la imagen perfecta gracias a que tu navegador web sí la carga:</p>
    </div>

    <canvas id="canvas" width="1600" height="800"></canvas>
    <br>
    <button onclick="descargarPNG()">Descargar Logo Oficial (.png)</button>

    <script>
        // Cargar fuente explícitamente y pintar en Canvas
        document.fonts.ready.then(function () {
            // Un texto fantasma temporal forzará a descargar la fuente al 100% si el navegador no lo hizo
            let ghostDiv = document.createElement('div');
            ghostDiv.style.fontFamily = "'Allison', cursive";
            ghostDiv.style.opacity = '0';
            ghostDiv.innerText = '.';
            document.body.appendChild(ghostDiv);

            setTimeout(() => {
                const canvas = document.getElementById('canvas');
                const ctx = canvas.getContext('2d');

                // Limpiar fondo
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Alineación
                ctx.textBaseline = 'middle';
                ctx.textAlign = 'center';

                // Transformación: ir al centro, rotar -3 grados (como el romántico original)
                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(-3 * Math.PI / 180);

                // Texto de la firma, muy alta resolución
                ctx.font = '380px "Allison"';
                ctx.fillStyle = '#1c1c1c';
                ctx.fillText('Manuel Pertuz', 0, 0);

                ctx.restore();
                document.body.removeChild(ghostDiv);
            }, 300);
        });

        function descargarPNG() {
            const canvas = document.getElementById('canvas');
            const url = canvas.toDataURL('image/png');
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Firma_Oficial_Manuel_Pertuz.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>

</html>
