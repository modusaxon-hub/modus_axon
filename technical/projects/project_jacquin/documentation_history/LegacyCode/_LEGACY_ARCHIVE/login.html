<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>J.A.M Inicia Sesión</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css?v=7" />
  <link rel="stylesheet" href="css/premium-forms.css?v=2" />
</head>

<body>
  <!-- Header Web Component -->
  <jam-header></jam-header>

  <main class="main-login-container">
    <section class="login-card">
      <form name="login" id="login-form">
        <h1 class="login-title">Ingresar</h1>

        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <div class="input-wrapper">
            <i class="bi bi-envelope input-icon"></i>
            <input class="form-input-glass" type="email" name="email" id="email" placeholder="usuario@ejemplo.com"
              required />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <i class="bi bi-lock input-icon"></i>
            <input class="form-input-glass" type="password" name="password" id="password" placeholder="••••••••"
              required />
            <i class="bi bi-eye-slash toggle-password" id="togglePassword"></i>
          </div>
        </div>

        <button class="btn-premium-submit" type="submit">
          Iniciar Sesión
          <i class="bi bi-arrow-right-short"></i>
        </button>

        <p id="mensaje-respuesta"></p>

        <div class="form-footer">
          <p>
            Al ingresar aceptas nuestros
            <a href="terms.html">Términos</a> y
            <a href="dataPolicy.html">Política de Datos</a>.
          </p>
        </div>

        <div class="form-footer option-login">
          <p>
            ¿Eres nuevo? <br />
            <a href="registro.html">¡Regístrate ahora!</a>
          </p>
          <p style="margin-top: 15px;">
            <a href="reset.html" style="color: var(--color-humo-gris); font-size: 0.85rem;">
              ¿Olvidaste tu contraseña?
            </a>
          </p>
        </div>
      </form>
    </section>
  </main>

  <jam-footer></jam-footer>

  <script src="js/services/api.js?v=3.8"></script>
  <script src="js/helpers/AvatarHelper.js?v=1.3"></script>
  <script src="js/components/Navbar.js?v=2.6"></script>
  <script src="js/components/Header.js?v=4.3"></script>
  <script src="js/components/Footer.js?v=2.4"></script>
  <script src="js/logoSound.js?v=1.1"></script>
  <script src="js/login.js?v=2.1"></script>
</body>

</html>
