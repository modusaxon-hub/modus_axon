<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>JACQUIN - Docentes</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  <style>
    .module-section {
      padding: 2rem 5%;
      min-height: 80vh;
      color: white;
      text-align: center;
    }

    .placeholder-content {
      background: rgba(255, 255, 255, 0.05);
      padding: 3rem;
      border-radius: 20px;
      margin-top: 2rem;
      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body>
  <jam-header></jam-header>

  <main>
    <section class="module-section">
      <div style="
            display: flex;
            justify-content: space-between;
            align-items: center;
          ">
        <h1>Panel Docente</h1>
        <a href="gestion.html" class="btn-module" style="width: auto">Volver</a>
      </div>

      <div class="placeholder-content">
        <i class="bi bi-person-video3" style="font-size: 4rem; color: var(--color-acento-naranja)"></i>
        <h2 style="margin: 20px 0">Gestión Académica</h2>
        <p style="color: var(--color-humo-gris)">
          El espacio para la gestión de horarios, asistencia y recursos
          educativos estará disponible pronto.
        </p>
      </div>
    </section>
  </main>

  <jam-footer></jam-footer>

  <script src="js/services/api.js?v=3.8"></script>
  <script src="js/helpers/AvatarHelper.js?v=1.3"></script>
  <script src="js/components/Navbar.js?v=2.6"></script>
  <script src="js/components/Header.js?v=4.3"></script>
  <script src="js/components/Footer.js?v=2.4"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (!ApiService.isAuthenticated()) window.location.href = "login.html";
    });
  </script>
</body>

</html>
