<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administración de Usuarios - JACQUIN</title>
  <link rel="stylesheet" href="css/style.css?v=21" />
  <script src="js/services/api.js?v=4.4"></script>
  <script src="js/components/Header.js?v=4.3"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  <style>
    .admin-section {
      padding: 2rem 5%;
      padding-top: 180px;
      min-height: 100vh;
      color: white;
    }

    /* Header mejorado */
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .admin-header h1 {
      font-size: 2rem;
      font-weight: 600;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .admin-header h1 i {
      color: var(--color-acento-naranja);
    }

    .user-stats {
      display: flex;
      gap: 25px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 12px 20px;
      text-align: center;
      min-width: 80px;
    }

    .stat-card .number {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--color-acento-azul);
    }

    .stat-card .label {
      font-size: 0.65rem;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.5px;
    }

    /* Controls mejorados */
    .controls-bar {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .search-container {
      flex: 1;
      min-width: 250px;
      position: relative;
    }

    .search-container i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.3);
    }

    .search-container input {
      width: 100%;
      padding: 14px 15px 14px 45px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: white;
      font-size: 0.95rem;
      transition: all 0.3s;
    }

    .search-container input:focus {
      outline: none;
      border-color: var(--color-acento-azul);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 3px rgba(147, 182, 238, 0.1);
    }

    .filter-group {
      display: flex;
      gap: 8px;
    }

    .filter-btn {
      padding: 10px 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .filter-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: white;
    }

    .filter-btn.active {
      background: var(--color-acento-azul);
      border-color: var(--color-acento-azul);
      color: white;
    }

    /* Tabla mejorada */
    .table-container {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: rgba(0, 0, 0, 0.3);
    }

    th {
      text-align: left;
      padding: 18px 20px;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    td {
      padding: 18px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      vertical-align: middle;
    }

    tbody tr {
      transition: all 0.2s;
      cursor: pointer;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    /* User cell mejorada */
    .user-cell {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .user-avatar {
      width: 45px;
      height: 45px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--color-principal-azul), var(--color-acento-azul));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1rem;
      color: white;
      flex-shrink: 0;
    }

    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 12px;
    }

    .user-info .name {
      font-weight: 500;
      color: white;
      font-size: 0.95rem;
    }

    .user-info .email {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 2px;
    }

    /* Role badges mejorados */
    .role-badge {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .role-1 {
      background: rgba(231, 76, 60, 0.15);
      color: #e74c3c;
      border: 1px solid rgba(231, 76, 60, 0.3);
    }

    .role-2 {
      background: rgba(241, 196, 15, 0.15);
      color: #f1c40f;
      border: 1px solid rgba(241, 196, 15, 0.3);
    }

    .role-3 {
      background: rgba(52, 152, 219, 0.15);
      color: #3498db;
      border: 1px solid rgba(52, 152, 219, 0.3);
    }

    .role-4 {
      background: rgba(149, 165, 166, 0.15);
      color: #95a5a6;
      border: 1px solid rgba(149, 165, 166, 0.3);
    }

    .role-5 {
      background: rgba(155, 89, 182, 0.15);
      color: #9b59b6;
      border: 1px solid rgba(155, 89, 182, 0.3);
    }

    /* ID badge */
    .id-badge {
      background: rgba(255, 255, 255, 0.05);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.4);
      font-family: monospace;
    }

    /* Action buttons */
    .action-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.7);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .action-btn:hover {
      background: var(--color-acento-azul);
      border-color: var(--color-acento-azul);
      color: white;
    }

    /* Loading state */
    .loading-row td {
      text-align: center;
      padding: 60px;
      color: rgba(255, 255, 255, 0.3);
    }

    .loading-spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--color-acento-azul);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .admin-header {
        flex-direction: column;
        gap: 20px;
        align-items: flex-start;
      }

      .user-stats {
        width: 100%;
        justify-content: space-between;
      }

      .controls-bar {
        flex-direction: column;
      }

      .filter-group {
        flex-wrap: wrap;
      }

      th:nth-child(1),
      td:nth-child(1) {
        display: none;
      }

      th:nth-child(3),
      td:nth-child(3) {
        display: none;
      }
    }
  </style>
</head>

<body>
  <jam-header></jam-header>

  <main>
    <section class="admin-section">
      <div class="admin-header">
        <h1><i class="bi bi-people-fill"></i> Gestión de Usuarios</h1>
        <div class="user-stats">
          <div class="stat-card">
            <div class="number" id="stat-total">—</div>
            <div class="label">Total</div>
          </div>
          <div class="stat-card">
            <div class="number" id="stat-students">—</div>
            <div class="label">Estudiantes</div>
          </div>
          <div class="stat-card">
            <div class="number" id="stat-teachers">—</div>
            <div class="label">Docentes</div>
          </div>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls-bar">
        <div class="search-container">
          <i class="bi bi-search"></i>
          <input type="text" id="user-search" placeholder="Buscar por nombre, email o ID..." autocomplete="off">
        </div>
        <div class="filter-group">
          <button class="filter-btn active" data-role="all"><i class="bi bi-grid"></i> Todos</button>
          <button class="filter-btn" data-role="1"><i class="bi bi-shield"></i> Admin</button>
          <button class="filter-btn" data-role="2"><i class="bi bi-person-workspace"></i> Docentes</button>
          <button class="filter-btn" data-role="3"><i class="bi bi-mortarboard"></i> Estudiantes</button>
          <button class="filter-btn" data-role="4"><i class="bi bi-hourglass"></i> Aspirantes</button>
          <button class="filter-btn" data-role="5"><i class="bi bi-person-badge"></i> Colaboradores</button>
        </div>
      </div>

      <!-- Table -->
      <div class="table-container">
        <table id="users-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Usuario</th>
              <th>Email</th>
              <th>Rol</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr class="loading-row" id="loading-row">
              <td colspan="5">
                <div class="loading-spinner"></div>
                <div style="margin-top: 15px;">Cargando usuarios...</div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="user-profile-modal" class="modal-overlay"
    style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; display:none; justify-content:center; align-items:center; backdrop-filter:blur(8px);">
  </div>

  <jam-footer></jam-footer>

  <!-- Scripts -->
  <script src="js/components/Navbar.js"></script>
  <script src="js/components/Footer.js?v=4.3"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/toast_overlay.js"></script>
  <script src="js/admin_shared_academic.js?v=1.0"></script>
  <script src="js/user_profile_modal.js?v=4.3"></script>
  <script src="js/admin_users.js?v=4.1"></script>
</body>

</html>
