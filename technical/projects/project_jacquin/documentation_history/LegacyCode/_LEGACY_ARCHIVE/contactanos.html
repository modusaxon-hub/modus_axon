<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css?v=7" />
  <link rel="stylesheet" href="css/premium-forms.css?v=1" />
  <title>J.A.M. Contáctenos</title>
</head>

<body>
  <jam-header></jam-header>

  <main class="main-login-container">
    <section class="login-card"
      style="max-width: 1000px; display: flex; flex-wrap: wrap; gap: 40px; align-items: stretch; padding: 4rem;">

      <!-- Contact Info Side -->
      <div style="flex: 1; min-width: 300px; padding-right: 20px; border-right: 1px solid rgba(255,255,255,0.1);">
        <h2 class="login-title" style="text-align: left; margin-bottom: 1rem;">¡Hablemos!</h2>
        <p style="color: var(--color-humo-gris); line-height: 1.6; margin-bottom: 3rem;">
          Si buscas asistencia experta, nuestro equipo dedicado está preparado para apoyarte en cada paso del camino.
        </p>

        <div style="display: flex; flex-direction: column; gap: 2rem;">
          <div style="display: flex; align-items: center; gap: 20px;">
            <div
              style="width: 50px; height: 50px; background: rgba(147, 182, 238, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
              <i class="bi bi-telephone-outbound" style="font-size: 1.5rem; color: var(--color-acento-azul)"></i>
            </div>
            <div>
              <p style="color: white; margin: 0; font-weight: 600;">Llámanos</p>
              <span style="color: var(--color-humo-gris)">+57 304 232 8575</span>
            </div>
          </div>

          <div style="display: flex; align-items: center; gap: 20px;">
            <div
              style="width: 50px; height: 50px; background: rgba(147, 182, 238, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
              <i class="bi bi-envelope" style="font-size: 1.5rem; color: var(--color-acento-azul)"></i>
            </div>
            <div>
              <p style="color: white; margin: 0; font-weight: 600;">Email</p>
              <span style="color: var(--color-humo-gris)">adminadmin@jacquin.com.co</span>
            </div>
          </div>

          <div style="display: flex; align-items: center; gap: 20px;">
            <div
              style="width: 50px; height: 50px; background: rgba(147, 182, 238, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
              <i class="bi bi-whatsapp" style="font-size: 1.5rem; color: var(--color-acento-azul)"></i>
            </div>
            <div>
              <p style="color: white; margin: 0; font-weight: 600;">WhatsApp</p>
              <span style="color: var(--color-humo-gris)">+57 304 232 8575</span>
            </div>
          </div>
        </div>

        <div style="margin-top: 4rem;">
          <p style="color: white; margin-bottom: 1rem; font-weight: 600;">Síguenos:</p>
          <div class="social-icons" style="justify-content: flex-start; gap: 20px;">
            <a href="#" style="color: white; font-size: 1.5rem; transition: color 0.3s;"><i
                class="bi bi-facebook"></i></a>
            <a href="#" style="color: white; font-size: 1.5rem; transition: color 0.3s;"><i
                class="bi bi-tiktok"></i></a>
            <a href="#" style="color: white; font-size: 1.5rem; transition: color 0.3s;"><i
                class="bi bi-twitter-x"></i></a>
            <a href="#" style="color: white; font-size: 1.5rem; transition: color 0.3s;"><i
                class="bi bi-instagram"></i></a>
          </div>
        </div>
      </div>

      <!-- Form Side -->
      <div style="flex: 1; min-width: 300px;">
        <form id="contact-form" class="contactanos">
          <div class="form-group">
            <label>Tu Nombre</label>
            <div class="input-wrapper">
              <i class="bi bi-person input-icon"></i>
              <input type="text" name="nombre" class="form-input-glass" placeholder="Nombre completo" />
            </div>
          </div>

          <div class="form-group">
            <label>Correo Electrónico</label>
            <div class="input-wrapper">
              <i class="bi bi-envelope input-icon"></i>
              <input type="email" name="email" class="form-input-glass" placeholder="ejemplo@correo.com" />
            </div>
          </div>

          <div class="form-group">
            <label>Teléfono</label>
            <div class="input-wrapper">
              <i class="bi bi-telephone input-icon"></i>
              <input type="tel" name="telefono" class="form-input-glass" placeholder="Número de contacto" />
            </div>
          </div>

          <div class="form-group">
            <label>Mensaje</label>
            <div class="input-wrapper">
              <i class="bi bi-chat-dots input-icon" style="top: 20px;"></i>
              <textarea name="mensaje" class="form-input-glass" rows="4"
                placeholder="¿Cómo podemos ayudarte?"></textarea>
            </div>
          </div>

          <div class="form-group">
            <label>¿Cómo nos conociste?</label>
            <div class="input-wrapper">
              <i class="bi bi-search input-icon"></i>
              <select name="origen" class="form-input-glass">
                <option value="internet">Búsqueda en internet</option>
                <option value="referencia">Referencia de amigo/familiar</option>
                <option value="redes">Redes sociales</option>
                <option value="otros">Otros</option>
              </select>
            </div>
          </div>

          <button type="submit" class="btn-premium-submit">
            ENVIAR MENSAJE
            <i class="bi bi-send"></i>
          </button>

          <div style="margin-top: 1.5rem; font-size: 0.8rem; color: var(--color-humo-gris);">
            <label style="display: flex; gap: 8px; align-items: flex-start; margin-bottom: 5px; cursor: pointer;">
              <input type="checkbox" style="margin-top: 3px" />
              <span>Acepto los <a href="terms.html">términos y condiciones</a>.</span>
            </label>
            <label style="display: flex; gap: 8px; align-items: flex-start; cursor: pointer;">
              <input type="checkbox" style="margin-top: 3px" />
              <span>Acepto la <a href="dataPolicy.html">política de datos</a>.</span>
            </label>
          </div>
        </form>
      </div>

    </section>
  </main>

  <jam-footer></jam-footer>

  <script src="js/helpers/AvatarHelper.js?v=1.3"></script>
  <script src="js/components/Navbar.js?v=2.6"></script>
  <script src="js/components/Header.js?v=4.3"></script>
  <script src="js/components/Footer.js?v=2.4"></script>
  <script src="js/services/api.js?v=3.8"></script>
  <script src="js/contact.js"></script>
</body>

</html>
