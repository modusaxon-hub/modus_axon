<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>J.A.M Recuperar Contraseña</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css?v=7" />
  <link rel="stylesheet" href="css/premium-forms.css?v=1" />
</head>

<body>
  <jam-header></jam-header>

  <main class="main-login-container">
    <section class="login-card">
      <h1 class="login-title">Recuperar Contraseña</h1>

      <form id="reset-form" action="javascript:void(0)">

        <p id="instructions" style="
              text-align: center;
              color: var(--color-humo-gris);
              margin-bottom: 2rem;
              font-size: 0.95rem;
              line-height: 1.5;
            ">
          Ingresa tu correo electrónico registrado y te enviaremos las
          instrucciones para restablecer tu contraseña.
        </p>

        <div id="reset-container">
          <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <div class="input-wrapper">
              <i class="bi bi-envelope input-icon"></i>
              <input type="email" id="email" class="form-input-glass" placeholder="usuario@ejemplo.com" required />
            </div>
          </div>
        </div>

        <button id="submit-btn" class="btn-premium-submit" type="submit">
          Enviar Instrucciones
        </button>

        <div class="form-footer option-login">
          <a href="login.html">Volver al Inicio de Sesión</a>
        </div>
      </form>
    </section>
  </main>

  <jam-footer></jam-footer>

  <script src="js/services/api.js?v=3.8"></script>
  <script src="js/helpers/AvatarHelper.js?v=1.3"></script>
  <script src="js/components/Navbar.js?v=2.6"></script>
  <script src="js/components/Header.js?v=4.3"></script>
  <script src="js/components/Footer.js?v=2.4"></script>
  <script src="js/logoSound.js?v=1.1"></script>
  <script src="js/reset.js?v=3.1"></script>
</body>

</html>
