<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Multimedia | JACQUIN Academia Musical</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .gallery-placeholder {
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, rgba(20, 30, 48, 0.8), rgba(36, 59, 85, 0.8));
            backdrop-filter: blur(10px);
            margin: 40px auto;
            max-width: 800px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }

        .gallery-placeholder i {
            font-size: 4rem;
            margin-bottom: 20px;
            color: var(--color-acento-azul, #3498db);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 0.8;
            }
        }

        .gallery-placeholder h2 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .gallery-placeholder p {
            font-size: 1.1rem;
            color: #ccc;
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <jam-header></jam-header>

    <main>
        <div class="gallery-placeholder">
            <i class="bi bi-camera-reels"></i>
            <h2>Galería Multimedia</h2>
            <p>Estamos preparando algo increíble para mostrarte el talento de nuestra comunidad.</p>
            <p style="font-size: 0.9rem; margin-top: 20px; color: #888;">Próximamente fotos y videos de nuestros
                conciertos y presentaciones.</p>
            <a href="index.html" class="hover-link"
                style="margin-top: 30px; color: var(--color-acento-azul, #3498db); text-decoration: none; font-weight: bold;">
                <i class="bi bi-arrow-left" style="font-size: 1rem; vertical-align: middle;"></i> Volver al Inicio
            </a>
        </div>
    </main>

    <jam-footer></jam-footer>

    <script src="js/services/api.js?v=3.8"></script>
    <script src="js/helpers/AvatarHelper.js?v=1.3"></script>
    <script src="js/components/Navbar.js?v=2.6"></script>
    <script src="js/components/Header.js?v=4.3"></script>
    <script src="js/components/Footer.js?v=2.4"></script>
    <script src="js/logoSound.js?v=1.1"></script>
</body>

</html>
