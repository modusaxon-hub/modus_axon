<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="css/style.css?v=7" />
  <link rel="stylesheet" href="css/premium-forms.css?v=1" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  <title>JACQUIN - Inscripción</title>
</head>

<body>
  <jam-header></jam-header>

  <main class="main-login-container">
    <section class="login-card" style="max-width: 600px;">
      <h1 class="login-title">Inscripción Aspirante</h1>

      <form id="register-form">

        <div class="form-group">
          <label for="full-name">Nombre Completo</label>
          <div class="input-wrapper">
            <i class="bi bi-person input-icon"></i>
            <input type="text" id="full-name" name="full-name" class="form-input-glass"
              placeholder="Escribe tu nombre y apellido" autocomplete="name" required />
          </div>
        </div>

        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <div class="input-wrapper">
            <i class="bi bi-envelope input-icon"></i>
            <input type="email" id="email" name="email" class="form-input-glass" placeholder="ejemplo@correo.com"
              autocomplete="email" required />
          </div>
        </div>

        <div class="form-group">
          <label for="phone">Número de Teléfono</label>
          <div class="input-wrapper">
            <i class="bi bi-telephone input-icon"></i>
            <input type="tel" id="phone" name="phone" class="form-input-glass" placeholder="+57 318 888 8888"
              autocomplete="tel" />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <i class="bi bi-lock input-icon"></i>
            <input type="password" id="password" class="form-input-glass" placeholder="Crea una contraseña segura"
              autocomplete="new-password" required />
            <i class="bi bi-eye-slash toggle-password" id="togglePassword"></i>
          </div>
          <small
            style="color: rgba(255,255,255,0.6); font-size: 0.8rem; margin-top: 5px; display: block; padding-left: 10px;">
            Mínimo 8 caracteres, una mayúscula, un número y un símbolo.
          </small>
        </div>

        <div class="form-group">
          <label for="course">Curso de Interés</label>
          <div class="input-wrapper">
            <i class="bi bi-music-note-beamed input-icon"></i>
            <select id="course" name="course" class="form-input-glass">
              <option value="">Selecciona un curso</option>
              <option value="percusión">Percusión</option>
              <option value="guitarra">Guitarra (Acústica y Eléctrica)</option>
              <option value="piano">Piano (Clásico y Moderno)</option>
              <option value="voz">Voz (Técnica Vocal)</option>
              <option value="seniors">Senior's (Adulto Mayor)</option>
              <option value="shows">Shows (Presentaciones en Vivo)</option>
              <option value="exploración">Exploración (Iniciación Musical)</option>
              <option value="psicomúsica">Psicomúsica (Bienestar y Terapia)</option>
            </select>
          </div>
        </div>

        <div class="form-footer" style="text-align: left; padding: 0 10px;">
          <label style="display: flex; gap: 10px; align-items: flex-start; margin-bottom: 8px; cursor: pointer;">
            <input type="checkbox" required style="margin-top: 3px" />
            <span style="color: var(--color-humo-gris); font-size: 0.9rem;">
              He leído y acepto los <a href="terms.html">Términos y Condiciones</a>.
            </span>
          </label>
          <label style="display: flex; gap: 10px; align-items: flex-start; cursor: pointer;">
            <input type="checkbox" required style="margin-top: 3px" />
            <span style="color: var(--color-humo-gris); font-size: 0.9rem;">
              Acepto la <a href="dataPolicy.html">Política de Tratamiento de Datos</a>.
            </span>
          </label>
        </div>

        <button type="submit" class="btn-premium-submit">
          ENVIAR REGISTRO
          <i class="bi bi-send"></i>
        </button>

        <p id="mensaje-respuesta"></p>
      </form>
    </section>
  </main>

  <jam-footer></jam-footer>

  <!-- Web Components & Logic -->
  <script src="js/services/api.js?v=3.8"></script>
  <script src="js/helpers/AvatarHelper.js?v=1.3"></script>
  <script src="js/components/jam-logo.js?v=2"></script>
  <script src="js/components/Header.js?v=4.3"></script>
  <script src="js/components/Footer.js?v=2.4"></script>
  <script src="js/register.js?v=1.1"></script>
</body>

</html>
