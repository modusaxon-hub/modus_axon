<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODUS AXON | {{DOC_TITLE}} - {{PROJECT_NAME}}</title>
    <!-- MODUS AXON UI - Bio-Digital Futurism v3.1 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Space+Grotesk:wght@300..700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --void-black: #020608;
            --deep-space: #0A0F14;
            --bio-matrix-green: #00FF9F;
            --quantum-violet: #9B30FF;
            --ion-cyan: #00E5FF;
            --ice-text: #B0C8D8;
            --border-glow: rgba(0, 255, 159, 0.15);
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--void-black);
            color: var(--ice-text);
            font-family: var(--font-body);
            line-height: 1.6;
            padding: 40px;
        }

        /* Contenedor Principal A4-ish */
        .container {
            max-width: 850px;
            margin: 0 auto;
            background: var(--deep-space);
            border: 1px solid rgba(176, 200, 216, 0.1);
            border-radius: 12px;
            padding: 60px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--bio-matrix-green), var(--quantum-violet), var(--ion-cyan));
        }

        header {
            border-bottom: 1px solid rgba(176, 200, 216, 0.1);
            padding-bottom: 30px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            color: #fff;
            letter-spacing: -0.02em;
            margin-bottom: 5px;
        }

        .doc-meta {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--bio-matrix-green);
        }

        h2 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            color: var(--ion-cyan);
            margin: 40px 0 20px;
            display: flex;
            align-items: center;
        }

        h2::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--bio-matrix-green);
            margin-right: 12px;
            border-radius: 2px;
            box-shadow: 0 0 10px var(--bio-matrix-green);
        }

        p {
            margin-bottom: 20px;
        }

        .tag {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(155, 48, 255, 0.2);
            border: 1px solid var(--quantum-violet);
            border-radius: 4px;
            color: #fff;
            font-size: 0.75rem;
            font-family: var(--font-mono);
            margin-right: 8px;
        }

        code {
            font-family: var(--font-mono);
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--bio-matrix-green);
        }

        pre {
            background: #05080A;
            padding: 24px;
            border-radius: 8px;
            border: 1px solid rgba(176, 200, 216, 0.05);
            margin: 20px 0;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        th,
        td {
            text-align: left;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(176, 200, 216, 0.05);
        }

        th {
            background: rgba(255, 255, 255, 0.02);
            color: var(--ion-cyan);
            font-family: var(--font-display);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .footer-axon {
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px solid rgba(176, 200, 216, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: rgba(176, 200, 216, 0.5);
        }

        .logo-text {
            font-family: var(--font-display);
            font-weight: 700;
            color: #fff;
        }

        .logo-text span {
            color: var(--bio-matrix-green);
        }

        /* Media Queries for Print (A4) */
        @media print {
            @page {
                size: A4;
                margin: 2cm;
            }

            body {
                padding: 0;
                background: #fff !important;
                color: #000 !important;
            }

            .container {
                box-shadow: none !important;
                border: none !important;
                padding: 0 !important;
                margin: 0 !important;
                background: transparent !important;
            }

            .container::before {
                display: none;
            }

            h1,
            h2,
            th {
                color: #000 !important;
            }

            .tag {
                background: #eee !important;
                color: #000 !important;
                border: 1px solid #ccc !important;
            }

            code,
            pre {
                background: #f5f5f5 !important;
                color: #000 !important;
            }

            .logo-text span {
                color: #000 !important;
            }

            * {
                page-break-inside: avoid;
                break-inside: avoid;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <div>
                <div class="doc-meta">Documentación Técnica / {{VERSION}}</div>
                <h1>{{DOC_TITLE}}</h1>
                <p>Proyecto: {{PROJECT_NAME}}</p>
            </div>
            <div class="logo-text">MODUS<span>AXON</span></div>
        </header>

        <section id="content">
            {{PAGE_CONTENT}}
        </section>

        <div class="footer-axon">
            <div>2026 MODUS AXON | El Método de la Evolución Digital</div>
            <div>BUILD_ID: {{BUILD_ID}}</div>
        </div>
    </div>

</body>

</html>
